<!DOCTYPE html>
<html lang="th">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; font-size: 16px; }
        .error { color: red; font-size: 12px; display: none; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>ลงทะเบียนระบบ</h2>
    <div id="loader">กำลังเชื่อมต่อ LINE...</div>
    <form id="registerForm" style="display:none;" onsubmit="handleSubmit(event)">
        <input type="hidden" id="lineId">
        <div class="form-group"><label>เลข SAP (ID)</label><input type="text" id="sapId" required></div>
        <div class="form-group"><label>ชื่อ (Name)</label><input type="text" id="name" required></div>
        <div class="form-group"><label>นามสกุล (Surname)</label><input type="text" id="surname" required></div>
        <div class="form-group"><label>อีเมล (Email)</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
        <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="password" required></div>
        <div class="form-group">
            <label>ยืนยันรหัสผ่าน</label><input type="password" id="confirmPassword" required>
            <div id="passError" class="error">รหัสผ่านไม่ตรงกันอะเทอ เช็คหน่อย!</div>
        </div>
        <button type="submit" id="submitBtn">ลงทะเบียน</button>
    </form>
</div>

<script>
    // 🔴 เดี๋ยวเราต้องเอาค่ามาใส่ 2 บรรทัดนี้ในเฟส 4 นะ! 🔴
    const LIFF_ID = "2006253510-pV7R4yeX"; 
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzET5SkF2zxSE4JXRRyiOwCwmrkDK5R_EVVXZLqAsp4YwRHYr4gMDMjkYBbzFeBgrVv/exec";

    async function initLiff() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); } 
        else {
            const profile = await liff.getProfile();
            document.getElementById('lineId').value = profile.userId;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
    }

    async function handleSubmit(event) {
        event.preventDefault();
        const pwd = document.getElementById('password').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        
        if (pwd !== confirmPwd) { 
            document.getElementById('passError').style.display = 'block'; 
            return; 
        }
        document.getElementById('passError').style.display = 'none';
        
        // 1. ท่าปุ่มบุ๋ม (Disable ปุ่มทันทีเพื่อกันคนกดย้ำ)
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "กำลังส่งข้อมูล...";
        submitBtn.style.opacity = "0.6"; // ทำให้ปุ่มดูจางลงว่ากดไปแล้ว
    
        // 2. เสกกล่องหมุนๆ บล็อกหน้าจอ ห้ามกดปิด ห้ามคลิกข้างนอก
        Swal.fire({
            title: 'กำลังลงทะเบียน...',
            text: 'ระบบกำลังบันทึกข้อมูลจ้า รอแป๊บน้า อย่าเพิ่งปิดหน้านี้เลนเทอ',
            allowOutsideClick: false,
            showConfirmButton: false,
            didOpen: () => {
                Swal.showLoading(); // สั่งให้ไอคอนหมุนๆ ทำงาน
            }
        });
        
        const payload = {
            sapId: document.getElementById('sapId').value, 
            name: document.getElementById('name').value,
            surname: document.getElementById('surname').value, 
            email: document.getElementById('email').value,
            username: document.getElementById('username').value, 
            password: pwd, 
            lineId: document.getElementById('lineId').value
        };
    
        try {
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            
            // พอหลังบ้านตอบกลับมา ให้ปิดหน้าต่างหมุนๆ ก่อน
            Swal.close();
    
            if (result.status === "success") { 
                // 3. แสดง Popup สำเร็จ มีปุ่ม OK พอกดปุ๊บปิดหน้าต่าง LINE ทันที
                Swal.fire({
                    title: 'สำเร็จแล้วเทอ!',
                    text: result.message,
                    icon: 'success',
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#06C755' // สีเขียวสไตล์ LINE
                }).then((resAlert) => {
                    if (resAlert.isConfirmed) {
                        liff.closeWindow(); // สั่งปิดหน้าต่าง LIFF ทันที
                    }
                });
            } else { 
                // ถ้าหลังบ้านฟ้องว่าซ้ำ หรือมีปัญหา
                Swal.fire({
                    title: 'อุ๊ย พังอะ!',
                    text: result.message,
                    icon: 'error',
                    confirmButtonText: 'ลองใหม่'
                });
                // คืนชีพให้ปุ่มกลับมากดได้ใหม่
                submitBtn.disabled = false;
                submitBtn.innerText = "ลงทะเบียน";
                submitBtn.style.opacity = "1";
            }
        } catch (error) {
            Swal.close();
            Swal.fire({
                title: 'ระบบขัดข้อง!',
                text: 'ส่งข้อมูลไม่สำเร็จอ่ะเทอ น่าจะติดเรื่องเน็ตหรือเซิร์ฟเวอร์ขัดข้องนะ',
                icon: 'error',
                confirmButtonText: 'ตกลง'
            });
            // คืนชีพให้ปุ่มกลับมากดได้ใหม่
            submitBtn.disabled = false;
            submitBtn.innerText = "ลงทะเบียน";
            submitBtn.style.opacity = "1";
        }
    }
    window.onload = initLiff;
</script>
</body>
</html>
