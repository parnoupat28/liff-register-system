<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; font-size: 16px; }
        .error { color: red; font-size: 12px; display: none; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>ลงทะเบียนระบบ</h2>
    <div id="loader">กำลังเชื่อมต่อ LINE...</div>
    <form id="registerForm" style="display:none;" onsubmit="handleSubmit(event)">
        <input type="hidden" id="lineId">
        <div class="form-group"><label>เลข SAP (ID)</label><input type="text" id="sapId" required></div>
        <div class="form-group"><label>ชื่อ (Name)</label><input type="text" id="name" required></div>
        <div class="form-group"><label>นามสกุล (Surname)</label><input type="text" id="surname" required></div>
        <div class="form-group"><label>อีเมล (Email)</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
        <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="password" required></div>
        <div class="form-group">
            <label>ยืนยันรหัสผ่าน</label><input type="password" id="confirmPassword" required>
            <div id="passError" class="error">รหัสผ่านไม่ตรงกันอะเทอ เช็คหน่อย!</div>
        </div>
        <button type="submit" id="submitBtn">ลงทะเบียน</button>
    </form>
</div>

<script>
    // 🔴 เดี๋ยวเราต้องเอาค่ามาใส่ 2 บรรทัดนี้ในเฟส 4 นะ! 🔴
    const LIFF_ID = "2006253510-pV7R4yeX"; 
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzET5SkF2zxSE4JXRRyiOwCwmrkDK5R_EVVXZLqAsp4YwRHYr4gMDMjkYBbzFeBgrVv/exec";

    async function initLiff() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); } 
        else {
            const profile = await liff.getProfile();
            document.getElementById('lineId').value = profile.userId;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
    }

    async function handleSubmit(event) {
        event.preventDefault();
        const pwd = document.getElementById('password').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        if (pwd !== confirmPwd) { document.getElementById('passError').style.display = 'block'; return; }
        document.getElementById('passError').style.display = 'none';
        
        const payload = {
            sapId: document.getElementById('sapId').value, name: document.getElementById('name').value,
            surname: document.getElementById('surname').value, email: document.getElementById('email').value,
            username: document.getElementById('username').value, password: pwd, lineId: document.getElementById('lineId').value
        };

        const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") { alert(result.message); liff.closeWindow(); } 
        else { alert("พังอะเทอ: " + result.message); }
    }
    window.onload = initLiff;
</script>
</body>
</html>
